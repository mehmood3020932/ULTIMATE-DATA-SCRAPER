# Redis configuration for AI Scraping SaaS

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Performance
tcp-keepalive 300
timeout 0

# Security (set password in production)
# requirepass your-strong-password

# Key eviction
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes