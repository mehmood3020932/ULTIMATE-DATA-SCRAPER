apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ai-scraping
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: ai-scraping/notification-service:latest
        ports:
        - containerPort: 8004
        envFrom:
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"