apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: ai-scraping
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: ai-scraping/analytics-service:latest
        ports:
        - containerPort: 8003
        envFrom:
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"