syntax = "proto3";

package jobs;

message JobStatus {
    string job_id = 1;
    string status = 2;
    int32 progress_percent = 3;
    string message = 4;
    int64 timestamp = 5;
}

message JobCommand {
    string job_id = 1;
    string command = 2;  // cancel, pause, resume
    map<string, string> params = 3;
}

service JobService {
    rpc StreamStatus(JobStatus) returns (stream JobStatus);
    rpc SendCommand(JobCommand) returns (JobStatus);
}